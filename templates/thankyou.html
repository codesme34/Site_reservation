<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Merci !</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0c0c0e;
      --surface: #141416;
      --accent: #c8f56a;
      --accent-dim: rgba(200, 245, 106, 0.12);
      --text: #f0ede8;
      --muted: #6b6b70;
      --border: rgba(255,255,255,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #c8f56a, transparent 70%);
      top: -200px; right: -150px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #56f5c8, transparent 70%);
      bottom: -150px; left: -100px;
      animation-delay: -5s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }

    /* Grid texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 64px 56px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 80px rgba(200, 245, 106, 0.06), 0 32px 64px rgba(0,0,0,0.5);
      animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .checkmark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1.5px solid rgba(200, 245, 106, 0.3);
      margin-bottom: 32px;
      animation: pop 0.6s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    .checkmark svg {
      stroke: var(--accent);
      stroke-width: 2.5;
      width: 32px; height: 32px;
      animation: draw 0.5s 0.8s ease forwards;
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 16px;
      animation: fade-up 0.6s 0.5s ease both;
    }
    h1 em {
      color: var(--accent);
      font-style: italic;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 48px;
      animation: fade-up 0.6s 0.65s ease both;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Countdown ring */
    .timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fade-up 0.6s 0.8s ease both;
    }
    .ring {
      position: relative;
      width: 64px; height: 64px;
    }
    .ring svg {
      transform: rotate(-90deg);
      width: 100%; height: 100%;
    }
    .ring circle {
      fill: none;
      stroke-width: 3;
      r: 28;
      cx: 32; cy: 32;
    }
    .ring .track { stroke: var(--border); }
    .ring .progress {
      stroke: var(--accent);
      stroke-linecap: round;
      stroke-dasharray: 176;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--accent);
      color: #0c0c0e;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.95rem;
      border-radius: 12px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 24px rgba(200, 245, 106, 0.25);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(200, 245, 106, 0.4);
    }
    .btn svg { width: 16px; height: 16px; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">

    <div class="checkmark">
      <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>

    <h1>Merci <em>beaucoup !</em></h1>
    <p>Votre message a bien été reçu.<br>Nous reviendrons vers vous dans les plus brefs délais.</p>

    <div class="divider"></div>

    <div class="timer-wrap">
      <div class="ring">
        <svg viewBox="0 0 64 64">
          <circle class="track" />
          <circle class="progress" id="ring-prog" />
        </svg>
        <div class="ring-label" id="count">5</div>
      </div>
      <a href="/" class="btn" id="homeBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 21 9 12 15 12 15 21"/>
        </svg>
        Retour à l'accueil
      </a>
    </div>

  </div>

  <script>
    const TOTAL = 5;
    const CIRCUMFERENCE = 2 * Math.PI * 28; // ≈ 175.93
    const prog = document.getElementById('ring-prog');
    const count = document.getElementById('count');
    prog.style.strokeDasharray = CIRCUMFERENCE;
    prog.style.strokeDashoffset = 0;

    let remaining = TOTAL;

    function tick() {
      remaining--;
      count.textContent = remaining;
      const offset = CIRCUMFERENCE * (1 - remaining / TOTAL);
      prog.style.strokeDashoffset = offset;

      if (remaining <= 0) {
        window.location.href = '/';
      }
    }

    // Start after 1s so the animation settles
    setTimeout(() => {
      setInterval(tick, 1000);
    }, 1000);
  </script>

</body>
</html>
