<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name = "description" content = "Site de voyage et reservation en ligne">
  <title>Airlines reservation</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
</head>

<body>

  <div class="sticky-wrapper">
    <header>
      <!-- Logo à gauche -->
      <div class="logo">
        <img src="static/assets/images/logo_avion.png" alt="Logo">
      </div>

      <!-- Milieu : Icône WhatsApp + textes -->
      <div class="center-part">
        <i class="fa-brands fa-whatsapp whatsapp-icon"></i>

        <div class="text-stack">
          <span class="text-top">24h/7J</span>
          <span class="text-bottom">Ligne direct : 01 64 12 32 58</span>
        </div>
      </div>

      <!-- Barre de recherche à droite -->
      <div class="search-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="search" class="search-input" placeholder="Rechercher une ..." />
      </div>

      <div class="login_side">
        <button class="boutton_connect">
          <i class="fa-solid fa-circle-user"></i>
          <p>Mon compte</p>
        </button>
      </div>
    </header>

    <nav class="sub-navbar">
      <a href="#vols">
        <i class="fa-solid fa-plane"></i>
        <span>VOLS</span>
      </a>
      <a href="#vol-hotel">
        <i class="fa-solid fa-plane-departure"></i>
        <span>VOL + HÔTEL</span>
      </a>
      <a href="#location-vacances">
        <i class="fa-solid fa-house-user"></i>
        <span>LOCATION VACANCES</span>
      </a>
      <a href="#croisieres">
        <i class="fa-solid fa-ship"></i>
        <span>CROISIÈRES</span>
      </a>
      <a href="#location-voiture">
        <i class="fa-solid fa-car"></i>
        <span>LOCATION VOITURE</span>
      </a>
      <a href="#destinations">
        <i class="fa-solid fa-earth-americas"></i>
        <span>DESTINATIONS</span>
      </a>
      <a href="#offres">
        <i class="fa-solid fa-fire"></i>
        <span>OFFRES</span>
      </a>
      <a href="#pages">
        <i class="fa-solid fa-file"></i>
        <span>PAGES</span>
      </a>
      <a href="/contact">
        <i class="fa-solid fa-envelope"></i>
        <span>CONTACT</span>
      </a>
      <a href="#blog">
        <i class="fa-solid fa-blog"></i>
        <span>BLOG</span>
      </a>
      <a href="#acheter">
        <i class="fa-solid fa-shopping-cart"></i>
        <span>ACHETER</span>
      </a>
    </nav>
  </div>



  <section>
      <div class="image-accueil">
        <img src="static/assets/images/main2.webp" alt="Un couple regardant le coucher de soleil">
      </div>
      <div class="search-form">
        <div class="'search-section">
          <input type="text">

        </div>

      </div>
    </div>
    
  </section>

  <script src="static/js/script.js"></script>
</body>
</html>
